spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quickcommerce
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

jwt:
  secret: localDevelopmentSecretKey123456789012345678901234567890

logging:
  level:
    root: INFO
    com.quickcommerce: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
