spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/quickcommerce
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8084

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

razorpay:
  key-id: ${RAZORPAY_KEY_ID:your_key_id}
  key-secret: ${RAZORPAY_KEY_SECRET:your_key_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:your_webhook_secret}

payment:
  timeout: 600000  # 10 minutes
  retry:
    max-attempts: 3
    delay: 5000  # 5 seconds

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.quickcommerce: DEBUG
    com.quickcommerce.payment: INFO
    org.hibernate.SQL: DEBUG
