spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quickcommerce
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

razorpay:
  key-id: rzp_test_1234567890
  key-secret: test_secret_key
  webhook-secret: test_webhook_secret

grpc:
  client:
    orders-service:
      address: 'static://localhost:9092'
      negotiation-type: plaintext
    auth-service:
      address: 'static://localhost:9093'
      negotiation-type: plaintext

logging:
  level:
    root: INFO
    com.quickcommerce: DEBUG
    org.hibernate.SQL: DEBUG
