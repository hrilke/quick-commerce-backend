spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/quickcommerce
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8084}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

razorpay:
  key-id: ${RAZORPAY_KEY_ID:your_key_id}
  key-secret: ${RAZORPAY_KEY_SECRET:your_key_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:your_webhook_secret}

payment:
  timeout: ${PAYMENT_TIMEOUT:600000}
  retry:
    max-attempts: ${PAYMENT_RETRY_ATTEMPTS:3}
    delay: ${PAYMENT_RETRY_DELAY:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    "com.quickcommerce": DEBUG
    "com.quickcommerce.payment": INFO
    "org.hibernate.SQL": DEBUG
